services:
  php:
    build: ./docker/php
    container_name: rustyx_php
    volumes:
      - ./src:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: weatherapp
      DB_USER: weatheruser
      DB_PASS: weatherpass
      OWM_API_KEY: 25e7d3a28b3787cf76fff13dd02bf706
    networks:
      - rustyx_net
    restart: always

  nginx:
    image: nginx:alpine
    container_name: rustyx_nginx
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - rustyx_net
    restart: always

  db:
    image: mariadb:10.11
    container_name: rustyx_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: weatherapp
      MYSQL_USER: weatheruser
      MYSQL_PASSWORD: weatherpass
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/database.sql
    networks:
      - rustyx_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  rustyx_net:
    driver: bridge

volumes:
  db_data:
