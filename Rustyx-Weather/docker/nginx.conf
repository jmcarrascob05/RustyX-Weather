# Configuración del servidor web Nginx para RustyX Weather

server {
    listen 80;
    root /var/www/html;
    index index.php index.html;

    # Archivos estáticos: se sirven directamente sin pasar por PHP
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public";
    }

    # Rutas normales: intenta encontrar el archivo o redirige a index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Procesamiento de archivos PHP mediante FastCGI
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Bloquear acceso a archivos ocultos (.htaccess, etc.)
    location ~ /\.ht {
        deny all;
    }
}
